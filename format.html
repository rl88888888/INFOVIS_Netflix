<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-dark: #141414;
            --muted-gray: #B3B3B3;
            --border-gray: #333333;
        }

        body {
            background-color: var(--netflix-dark);
            color: #FFFFFF;
            font-family: 'Inter', 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        #chart-container {
            width: 100%;
            max-width: 800px;
            background-color: #1c1c1c;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-gray);
        }

        .chart-title {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            text-align: left;
            color: #FFFFFF;
        }

        .chart-subtitle {
            font-size: 13px;
            color: var(--muted-gray);
            margin-bottom: 25px;
            text-align: left;
            letter-spacing: 0.5px;
        }

        /* 坐標軸：僅保留類別名稱 */
        .axis path, .axis line { display: none; }
        .axis text { 
            fill: #FFFFFF; 
            font-size: 16px; 
            font-weight: bold;
        }

        .bar { 
            fill: var(--netflix-red); 
            cursor: pointer;
        }

        .label {
            fill: #FFFFFF;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="chart-container">
    <div class="chart-title">Qualified Content Volume</div>
    <div class="chart-subtitle">Distinct titles with valid IMDb scores (Matches Box Plot N)</div>
    <div id="bar-chart"></div>
</div>

<script>
const margin = {top: 10, right: 100, bottom: 20, left: 100};
const width = 800 - margin.left - margin.right;
const height = 200 - margin.top - margin.bottom;

const svg = d3.select("#bar-chart")
    .append("svg")
    .attr("viewBox", `0 0 800 200`)
    .append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

d3.csv("netflix_cleaned_categorized.csv").then(rawData => {
    
    // 1. 統一數據邏輯：過濾 + 去重
    const uniqueMap = new Map();
    rawData.forEach(d => {
        const score = +d.imdb_score;
        // 關鍵：只納入不重複且有評分 (>0) 的影片
        if (!uniqueMap.has(d.id) && !isNaN(score) && score > 0) {
            uniqueMap.set(d.id, d.type.toUpperCase());
        }
    });

    // 2. 轉換為統計陣列
    const counts = d3.rollup(Array.from(uniqueMap.values()), v => v.length, d => d);
    const data = Array.from(counts, ([type, count]) => ({ type, count }))
                      .sort((a, b) => b.count - a.count);

    // 3. 設定比例尺
    const y = d3.scaleBand()
        .domain(data.map(d => d.type))
        .range([0, height])
        .padding(0.4);

    const x = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.count)])
        .range([0, width]);

    // 4. 繪製 Y 軸標籤
    svg.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y));

    // 5. 繪製長條圖 (含動畫)
    svg.selectAll(".bar")
        .data(data)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("y", d => y(d.type))
        .attr("x", 0)
        .attr("height", y.bandwidth())
        .attr("width", 0)
        .transition()
        .duration(1200)
        .ease(d3.easeExpOut)
        .attr("width", d => x(d.count));

    // 6. 加上數值標籤 (含動畫延遲)
    svg.selectAll(".label")
        .data(data)
        .enter()
        .append("text")
        .attr("class", "label")
        .attr("y", d => y(d.type) + y.bandwidth() / 2 + 6)
        .attr("x", d => x(d.count) + 15)
        .text(d => d.count.toLocaleString())
        .style("opacity", 0)
        .transition()
        .delay(800)
        .duration(600)
        .style("opacity", 1);
});
</script>

</body>
</html>
