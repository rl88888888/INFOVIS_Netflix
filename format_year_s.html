<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-dark: #141414;
            --muted-gray: #B3B3B3;
            --border-gray: #333333;
        }

        body {
            background-color: var(--netflix-dark);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        #viz-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 大年份數字樣式 */
        #year-display {
            font-size: 80px;
            font-weight: 900;
            color: var(--netflix-red);
            text-align: center;
            margin-bottom: -10px;
            letter-spacing: -3px;
        }

        .chart-section { 
            width: 100%; 
            position: relative; 
            cursor: ew-resize; /* 提示使用者可以左右滑動 */
        }

        .chart-title {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            border-left: 4px solid var(--netflix-red);
            padding-left: 15px;
        }

        .axis path, .axis line { stroke: var(--border-gray); }
        .axis text { fill: var(--muted-gray); font-size: 11px; }

        /* 線條與面積樣式 */
        .area { fill: var(--netflix-red); fill-opacity: 0.15; }
        .line { fill: none; stroke: var(--netflix-red); stroke-width: 3; }

        /* 垂直指示線 */
        .hover-line { stroke: rgba(255, 255, 255, 0.3); stroke-width: 1px; stroke-dasharray: 4; }

        /* 時間軸滑桿樣式 */
        .slider-section {
            width: 100%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--border-gray);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--netflix-red);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
        }

        .tooltip {
            position: absolute;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border-gray);
            padding: 10px;
            border-radius: 4px;
            pointer-events: none;
            display: none;
            color: #FFFFFF;
            font-size: 13px;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="viz-wrapper">
    <div id="year-display">2015</div>

    <div class="chart-section" id="movie-section">
        <div class="chart-title">Movies Annual Volume (Distinct)</div>
        <div id="movie-chart"></div>
    </div>

    <div class="chart-section" id="show-section">
        <div class="chart-title">Shows Annual Volume (Distinct)</div>
        <div id="show-chart"></div>
    </div>

    <div class="slider-section">
        <input type="range" id="year-slider">
        <div style="color: var(--muted-gray); font-size: 11px; letter-spacing: 2px;">SCRUB CHARTS OR SLIDER TO EXPLORE DATA</div>
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const margin = {top: 10, right: 30, bottom: 30, left: 60};
const width = 900 - margin.left - margin.right;
const height = 200 - margin.top - margin.bottom;

const tooltip = d3.select("#tooltip");

d3.csv("netflix_cleaned_categorized.csv").then(rawData => {
    
    // 1. 數據去重與過濾
    const uniqueMap = new Map();
    rawData.forEach(d => {
        const score = +d.imdb_score;
        const year = +d.release_year;
        const key = `${d.id}_${year}`; 
        if (!uniqueMap.has(key) && !isNaN(score) && score > 0) {
            uniqueMap.set(key, { year, type: d.type.toUpperCase() });
        }
    });

    const cleanedData = Array.from(uniqueMap.values());
    const nestedData = d3.rollup(cleanedData, v => v.length, d => d.year, d => d.type);
    const years = Array.from(nestedData.keys()).sort(d3.ascending);
    
    const movieData = years.map(y => ({ year: y, count: nestedData.get(y).get("MOVIE") || 0 }));
    const showData = years.map(y => ({ year: y, count: nestedData.get(y).get("SHOW") || 0 }));

    // 2. 設定 Slider
    const yearExtent = d3.extent(years);
    const slider = d3.select("#year-slider")
        .attr("min", yearExtent[0]).attr("max", yearExtent[1]).attr("value", 2015);

    // 3. 比例尺
    const x = d3.scaleLinear().domain(yearExtent).range([0, width]);
    const yM = d3.scaleLinear().domain([0, d3.max(movieData, d => d.count)]).range([height, 0]);
    const yS = d3.scaleLinear().domain([0, d3.max(showData, d => d.count)]).range([height, 0]);

    // 4. 初始化圖表函式
    function setupChart(selector, data, yScale) {
        const svg = d3.select(selector).append("svg")
            .attr("viewBox", `0 0 900 200`)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        // 坐標軸
        svg.append("g").attr("transform", `translate(0,${height})`).attr("class", "axis")
           .call(d3.axisBottom(x).tickFormat(d3.format("d")));
        svg.append("g").attr("class", "axis").call(d3.axisLeft(yScale).ticks(4));

        // 面積與路徑
        const area = d3.area().x(d => x(d.year)).y0(height).y1(d => yScale(d.count)).curve(d3.curveMonotoneX);
        const line = d3.line().x(d => x(d.year)).y(d => yScale(d.count)).curve(d3.curveMonotoneX);

        svg.append("path").datum(data).attr("class", "area").attr("d", area);
        svg.append("path").datum(data).attr("class", "line").attr("d", line);

        // 互動元件 (隱藏中)
        const vLine = svg.append("line").attr("class", "hover-line").attr("y1", 0).attr("y2", height).style("display", "none");
        const focus = svg.append("circle").attr("r", 6).attr("fill", "white").attr("stroke", "var(--netflix-red)").attr("stroke-width", 2).style("display", "none");

        return { vLine, focus, yScale };
    }

    const movieElements = setupChart("#movie-chart", movieData, yM);
    const showElements = setupChart("#show-chart", showData, yS);

    // 5. 核心更新函式 (Scrubber Logic)
    function update(year) {
        year = Math.round(year); // 確保對齊年份
        d3.select("#year-display").text(year);
        slider.property("value", year);

        const dM = movieData.find(d => d.year === year);
        const dS = showData.find(d => d.year === year);

        if (dM && dS) {
            const posX = x(year);
            
            // 同步更新 Movie 指示器
            movieElements.vLine.attr("x1", posX).attr("x2", posX).style("display", null);
            movieElements.focus.attr("cx", posX).attr("cy", yM(dM.count)).style("display", null);

            // 同步更新 Show 指示器
            showElements.vLine.attr("x1", posX).attr("x2", posX).style("display", null);
            showElements.focus.attr("cx", posX).attr("cy", yS(dS.count)).style("display", null);

            // Tooltip 內容
            tooltip.style("display", "block")
                .html(`<strong>${year}</strong><br>Movies: ${dM.count}<br>Shows: ${dS.count}`)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 40) + "px");
        }
    }

    // 6. 註冊 Slider 事件
    slider.on("input", function() { update(+this.value); });

    // 7. 註冊 Graph Overlay 事件 (直接在圖表上滑動)
    const chartSections = d3.selectAll(".chart-section");
    
    chartSections.on("mousemove touchmove", function(event) {
        const [mx] = d3.pointer(event);
        const year = x.invert(mx - margin.left); // 將滑鼠座標轉換回年份
        if (year >= yearExtent[0] && year <= yearExtent[1]) {
            update(year);
        }
    });

    chartSections.on("mouseleave", () => {
        tooltip.style("display", "none");
    });

    // 初始化 2015
    update(2015);
});
</script>
</body>
</html>
