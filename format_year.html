<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-dark: #141414;
            --muted-gray: #B3B3B3;
            --border-gray: #333333;
        }

        body {
            background-color: var(--netflix-dark);
            color: #FFFFFF;
            font-family: 'Inter', 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        #viz-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .chart-title {
            color: #FFFFFF;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            border-left: 4px solid var(--netflix-red);
            padding-left: 15px;
        }

        .axis path, .axis line { stroke: var(--border-gray); }
        .axis text { fill: var(--muted-gray); font-size: 12px; }

        /* 線條與面積樣式 */
        .area { fill: var(--netflix-red); fill-opacity: 0.2; }
        .line { fill: none; stroke: var(--netflix-red); stroke-width: 3; }

        /* 互動提示 */
        .tooltip {
            position: absolute;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border-gray);
            padding: 10px;
            border-radius: 4px;
            pointer-events: none;
            display: none;
            color: #FFFFFF;
            font-size: 13px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="viz-wrapper">
    <div class="chart-section">
        <div class="chart-title">Movies Annual Volume (Distinct)</div>
        <div id="movie-chart"></div>
    </div>

    <div class="chart-section">
        <div class="chart-title">Shows Annual Volume (Distinct)</div>
        <div id="show-chart"></div>
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const margin = {top: 20, right: 30, bottom: 40, left: 60};
const width = 900 - margin.left - margin.right;
const height = 250 - margin.top - margin.bottom;

const tooltip = d3.select("#tooltip");

d3.csv("netflix_cleaned_categorized.csv").then(rawData => {
    
    // 1. 數據去重與過濾：確保有評分且 ID 唯一
    const uniqueMap = new Map();
    rawData.forEach(d => {
        const score = +d.imdb_score;
        const year = +d.release_year;
        // 每年、每個 ID 只計算一次
        const key = `${d.id}_${year}`; 
        if (!uniqueMap.has(key) && !isNaN(score) && score > 0) {
            uniqueMap.set(key, { year, type: d.type.toUpperCase() });
        }
    });

    const cleanedData = Array.from(uniqueMap.values());

    // 2. 按年份與類型聚合
    const nestedData = d3.rollup(cleanedData, v => v.length, d => d.year, d => d.type);
    const years = Array.from(nestedData.keys()).sort(d3.ascending);
    
    const movieData = years.map(y => ({ year: y, count: nestedData.get(y).get("MOVIE") || 0 }));
    const showData = years.map(y => ({ year: y, count: nestedData.get(y).get("SHOW") || 0 }));

    // 3. 設定共通比例尺
    const x = d3.scaleLinear().domain(d3.extent(years)).range([0, width]);
    const yMovie = d3.scaleLinear().domain([0, d3.max(movieData, d => d.count)]).range([height, 0]);
    const yShow = d3.scaleLinear().domain([0, d3.max(showData, d => d.count)]).range([height, 0]);

    // 4. 繪製函數
    function drawChart(selector, data, yScale) {
        const svg = d3.select(selector)
            .append("svg")
            .attr("viewBox", `0 0 900 250`)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // 坐標軸
        svg.append("g").attr("transform", `translate(0,${height})`).attr("class", "axis")
           .call(d3.axisBottom(x).tickFormat(d3.format("d")));
        svg.append("g").attr("class", "axis").call(d3.axisLeft(yScale).ticks(5));

        // 面積圖
        const area = d3.area().x(d => x(d.year)).y0(height).y1(d => yScale(d.count)).curve(d3.curveMonotoneX);
        svg.append("path").datum(data).attr("class", "area").attr("d", area);

        // 線條圖
        const line = d3.line().x(d => x(d.year)).y(d => yScale(d.count)).curve(d3.curveMonotoneX);
        svg.append("path").datum(data).attr("class", "line").attr("d", line);

        // 互動圓點與提示
        const dots = svg.selectAll(".dot").data(data).enter().append("circle")
            .attr("cx", d => x(d.year)).attr("cy", d => yScale(d.count)).attr("r", 4)
            .attr("fill", "white").style("opacity", 0)
            .on("mouseover", function(event, d) {
                d3.select(this).style("opacity", 1);
                tooltip.style("display", "block")
                    .html(`<strong>Year: ${d.year}</strong><br>Titles: ${d.count}`)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                d3.select(this).style("opacity", 0);
                tooltip.style("display", "none");
            });
    }

    // 執行繪製
    drawChart("#movie-chart", movieData, yMovie);
    drawChart("#show-chart", showData, yShow);
});
</script>
</body>
</html>
